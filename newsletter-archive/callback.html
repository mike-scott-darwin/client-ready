<!DOCTYPE html>
<html>
<head><title>Threads OAuth</title></head>
<body style="font-family:sans-serif;padding:40px;text-align:center;background:#0a0a0a;color:#fff">
<h1>Threads Authorization</h1>
<div id="result" style="margin-top:20px;padding:20px;background:#141414;border-radius:8px;max-width:600px;margin:20px auto">
    <p>Processing...</p>
</div>
<script>
const params = new URLSearchParams(window.location.search);
const code = params.get('code');
const error = params.get('error');
const el = document.getElementById('result');

if (code) {
    el.innerHTML = `
        <p style="color:#4a9eff;font-size:1.2rem;font-weight:bold">Authorization code received!</p>
        <p style="margin-top:12px">Copy this code and paste it back:</p>
        <textarea style="width:100%;height:80px;background:#222;color:#fff;border:1px solid #333;border-radius:4px;padding:8px;font-family:monospace;font-size:0.9rem" onclick="this.select()">${code}</textarea>
    `;
} else if (error) {
    el.innerHTML = `<p style="color:#ff4444">Error: ${error}</p><p>${params.get('error_description') || ''}</p>`;
} else {
    el.innerHTML = '<p style="color:#ff4444">No authorization code received.</p>';
}
</script>
</body>
</html>
