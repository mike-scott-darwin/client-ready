<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Your Offer Builder — Quick Intake</title>
<meta name="robots" content="noindex" />
<style>
  :root{
    --ink:#1a1a1a; --muted:#6b7280; --line:#e5e7eb; --bg:#f6f7f9;
    --accent:#2563eb; --accent-dark:#1d4ed8; --ok:#059669; --card:#ffffff;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,Helvetica,sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.55;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:640px;margin:0 auto;padding:24px 20px 64px}
  .brand{font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);margin:8px 0 0}
  .progress{height:6px;background:var(--line);border-radius:999px;overflow:hidden;margin:18px 0 8px}
  .progress > i{display:block;height:100%;width:0;background:var(--accent);transition:width .3s ease}
  .count{font-size:13px;color:var(--muted);margin-bottom:22px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:28px 26px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
  h1{font-size:24px;line-height:1.25;margin:0 0 10px}
  h2{font-size:21px;line-height:1.3;margin:0 0 8px}
  .prompt{color:var(--muted);font-size:15px;margin:0 0 18px}
  label{display:block;font-weight:600;font-size:15px;margin:0 0 8px}
  textarea,input[type=text],input[type=email]{
    width:100%;border:1px solid var(--line);border-radius:10px;padding:13px 14px;
    font-family:inherit;font-size:16px;color:var(--ink);background:#fff;resize:vertical;
  }
  textarea{min-height:130px}
  textarea:focus,input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.12)}
  .hint{font-size:13px;color:var(--muted);margin-top:8px}
  .err{color:#dc2626;font-size:13px;margin-top:8px;display:none}
  .row{display:flex;gap:12px;margin-top:22px}
  button{
    font-family:inherit;font-size:16px;font-weight:600;border-radius:10px;padding:13px 22px;
    border:1px solid transparent;cursor:pointer;transition:.15s;
  }
  .next{background:var(--accent);color:#fff;flex:1}
  .next:hover{background:var(--accent-dark)}
  .back{background:#fff;color:var(--ink);border-color:var(--line)}
  .back:hover{background:#f3f4f6}
  .list{margin:14px 0 0;padding:0;list-style:none}
  .list li{padding:7px 0 7px 26px;position:relative;color:#374151;font-size:15px}
  .list li:before{content:"→";position:absolute;left:0;color:var(--accent);font-weight:700}
  .file{margin-top:10px;font-size:15px}
  .saved{font-size:12px;color:var(--muted);text-align:center;margin-top:16px;min-height:16px}
  .center{text-align:center}
  .big{font-size:44px;line-height:1;margin:4px 0 14px}
  .spin{display:inline-block;width:18px;height:18px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;vertical-align:-3px;margin-right:8px}
  @keyframes sp{to{transform:rotate(360deg)}}
  a{color:var(--accent)}
</style>
</head>
<body>
<div class="wrap">
  <p class="brand">Client Ready · DFY Offer Build</p>
  <div class="progress" id="bar" hidden><i id="fill"></i></div>
  <p class="count" id="count" hidden></p>
  <div class="card" id="card"><!-- steps render here --></div>
  <p class="saved" id="saved"></p>
</div>

<script>
/* ---------------------------------------------------------------------------
   CONFIG — set these two before you ship.
   webhookUrl: your GHL "Inbound Webhook" trigger URL (Automation → Workflows →
     add "Inbound Webhook" trigger → copy the URL). Answers POST here as JSON;
     map the fields onto the contact by `email`.
   fallbackEmail: if the webhook is blank or fails, the page offers a one-click
     email with all answers so an intake is NEVER lost.
--------------------------------------------------------------------------- */
const CONFIG = {
  webhookUrl: "PASTE_GHL_INBOUND_WEBHOOK_URL_HERE",
  fallbackEmail: "michael@michaelscott.io",
  maxUploadMB: 2
};

const QUESTIONS = [
  {key:"what_you_do", q:"What do you do?", prompt:"Describe what you help people with — like you're telling a friend at dinner. No jargon. 2–4 sentences."},
  {key:"best_client", q:"Who's your best client ever?", prompt:"One real person you've helped (or want to). What were they struggling with? What did they do for work? Before and after? No clients yet — describe who you'd most love to work with."},
  {key:"result", q:"What result do you deliver?", prompt:"What's different 90 days after working with you? Be specific. Not “they feel better” — “they have 3 paying clients and stopped second-guessing their offer.”"},
  {key:"process", q:"What's your process?", prompt:"Walk me through the steps you take someone through — first, second, third. Even if it's informal, describe how you actually help people start to finish."},
  {key:"differentiator", q:"What makes you different?", prompt:"What do you do that others in your space don't? Your background, approach, a specific framework, or just how you think about the problem differently."},
  {key:"story", q:"What's your story?", prompt:"Why do you do this? What happened that led you here? The messy version beats the polished version."},
  {key:"pricing", q:"What do you charge now (and want to)?", prompt:"Current and desired price. E.g. “$500/session now, want a $3K package” or “Haven't charged yet, thinking $2K–5K.”", short:true},
  {key:"stuck_point", q:"What's stopping you from getting more clients right now?", prompt:"Be honest. Your offer? Confidence? No funnel? No traffic? Don't know where to find people? This tells us what to build first."},
  {key:"client_language", q:"How do your clients describe their problem — in their own words?", prompt:"Copy-paste a real DM, email, or comment if you have one. If not, write what they typically say when they first reach out. Their exact words are gold."},
  {key:"failed_solutions", q:"What have they tried before that didn't work?", prompt:"Courses, other coaches, DIY, free YouTube, templates — what did they try and why did it fail? This positions your offer against the alternatives."},
  {key:"objections", q:"What objections do people have before buying from you?", prompt:"Price, time, skepticism, “I've tried this before,” “I'm not ready.” The ones you hear most, even if they feel awkward."}
];

const STORE_KEY = "dfy_intake_v1";
const data = load();
let step = 0; // 0 = intro, 1 = identity, 2..12 = questions, 13 = optional+submit
const LAST = QUESTIONS.length + 2; // 13

const card = document.getElementById("card");
const bar = document.getElementById("bar"), fill = document.getElementById("fill"), count = document.getElementById("count");
const saved = document.getElementById("saved");

function load(){ try{ return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; }catch(e){ return {}; } }
function persist(){ localStorage.setItem(STORE_KEY, JSON.stringify(data)); flash("Progress saved"); }
let flashT; function flash(m){ saved.textContent=m; clearTimeout(flashT); flashT=setTimeout(()=>saved.textContent="",1400); }
function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function render(){
  const showBar = step>=1 && step<=LAST;
  bar.hidden = !showBar; count.hidden = !showBar;
  if(showBar){
    const n = Math.min(Math.max(step-1,1), QUESTIONS.length);
    fill.style.width = (100*(step-1)/(LAST-1)) + "%";
    count.textContent = step===1 ? "Let's start" : (step<=LAST-1 ? "Question "+(step-1)+" of "+QUESTIONS.length : "Last step");
  }
  if(step===0) return intro();
  if(step===1) return identity();
  if(step>=2 && step<=QUESTIONS.length+1) return question(step-2);
  return optional();
}

function intro(){
  card.innerHTML = `
    <h1>Let's build your offer.</h1>
    <p class="prompt">Answer these 11 questions and I'll build your complete offer package — Dream Client Blueprint, validated offer, ready-to-send sales doc, sales page, 5-email sequence, and 5 ad hooks. Reviewed by me, back in your inbox within 48 hours.</p>
    <ul class="list">
      <li>Takes 10–15 minutes</li>
      <li>Be specific — your first instinct is usually right</li>
      <li>No wrong answers. Honesty beats perfection.</li>
      <li>New business? Make educated guesses — describe the vision.</li>
    </ul>
    <div class="row"><button class="next" id="go">Start &rarr;</button></div>`;
  document.getElementById("go").onclick = ()=>{ step=1; render(); };
}

function identity(){
  card.innerHTML = `
    <h2>First — who are you?</h2>
    <p class="prompt">So I can match this to your order and send your build to the right place.</p>
    <label>Your name</label>
    <input type="text" id="full_name" value="${esc(data.full_name)}" placeholder="First and last" />
    <div class="err" id="e_name">Please add your name.</div>
    <div style="height:16px"></div>
    <label>Your email</label>
    <input type="email" id="email" value="${esc(data.email)}" placeholder="The email you bought with" />
    <div class="err" id="e_email">Please use the email you purchased with.</div>
    ${navRow()}`;
  wireNav(()=>{
    const name=val("full_name"), email=val("email");
    let ok=true;
    if(!name){show("e_name");ok=false} if(!/.+@.+\..+/.test(email)){show("e_email");ok=false}
    if(!ok) return false;
    data.full_name=name; data.email=email; persist(); return true;
  });
}

function question(i){
  const it = QUESTIONS[i];
  const field = it.short
    ? `<input type="text" id="f" value="${esc(data[it.key])}" placeholder="Type your answer" />`
    : `<textarea id="f" placeholder="Type your answer">${esc(data[it.key])}</textarea>`;
  card.innerHTML = `
    <h2>${esc(it.q)}</h2>
    <p class="prompt">${esc(it.prompt)}</p>
    ${field}
    <div class="err" id="e_f">A sentence or two is plenty — this one matters.</div>
    ${navRow()}`;
  wireNav(()=>{
    const v=val("f");
    if(!v){ show("e_f"); return false; }
    data[it.key]=v; persist(); return true;
  });
}

function optional(){
  card.innerHTML = `
    <h2>Last thing — optional, but it helps.</h2>
    <p class="prompt">Links to 2–3 posts, emails, or videos that got your best response. This helps me match your voice in the copy.</p>
    <textarea id="content_links" placeholder="Paste links, one per line">${esc(data.content_links)}</textarea>
    <div style="height:18px"></div>
    <label>Have an existing offer doc or example? (optional)</label>
    <input type="file" id="file" class="file" accept=".pdf,.doc,.docx,.txt,.md,.png,.jpg,.jpeg" />
    <div class="hint">Optional. Under ${CONFIG.maxUploadMB}MB — bigger than that, paste a link above instead.</div>
    <div class="err" id="e_file">That file's over ${CONFIG.maxUploadMB}MB. Paste a link above instead.</div>
    <div class="row">
      <button class="back" id="back">&larr; Back</button>
      <button class="next" id="submit">Submit &amp; build my offer &rarr;</button>
    </div>`;
  document.getElementById("back").onclick=()=>{ data.content_links=val("content_links"); persist(); step--; render(); };
  document.getElementById("submit").onclick=submit;
}

function navRow(){ return `<div class="row"><button class="back" id="back">&larr; Back</button><button class="next" id="next">Next &rarr;</button></div>`; }
function wireNav(commit){
  const b=document.getElementById("back"); if(b) b.onclick=()=>{ step--; render(); };
  document.getElementById("next").onclick=()=>{ if(commit()){ step++; render(); } };
  const f=document.getElementById("f")||document.getElementById("full_name"); if(f) f.focus();
}
function val(id){ const el=document.getElementById(id); return el?el.value.trim():""; }
function show(id){ const el=document.getElementById(id); if(el) el.style.display="block"; }

async function submit(){
  data.content_links = val("content_links");
  const fileEl = document.getElementById("file");
  const btn = document.getElementById("submit");
  document.getElementById("e_file").style.display="none";
  let filePayload = null;
  if(fileEl && fileEl.files[0]){
    const f = fileEl.files[0];
    if(f.size > CONFIG.maxUploadMB*1024*1024){ show("e_file"); return; }
    filePayload = { name:f.name, type:f.type, dataBase64: await toB64(f) };
  }
  persist();
  const payload = Object.assign({
    source:"dfy-intake-page",
    product:"DFY Offer Build",
    submitted_at:new Date().toISOString()
  }, pick(), filePayload?{content_file:filePayload}:{});

  btn.disabled=true; btn.innerHTML='<span class="spin"></span>Building...';
  let ok=false;
  if(CONFIG.webhookUrl && !CONFIG.webhookUrl.startsWith("PASTE_")){
    try{
      const r = await fetch(CONFIG.webhookUrl,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});
      ok = r.ok;
    }catch(e){ ok=false; }
  }
  if(ok){ localStorage.removeItem(STORE_KEY); return done(); }
  return fallback(payload, btn);
}

function pick(){ const o={full_name:data.full_name,email:data.email}; QUESTIONS.forEach(q=>o[q.key]=data[q.key]||""); o.content_links=data.content_links||""; return o; }
function toB64(file){ return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(String(r.result).split(",")[1]||""); r.onerror=rej; r.readAsDataURL(file); }); }

function done(){
  bar.hidden=true; count.hidden=true; saved.textContent="";
  card.innerHTML = `
    <div class="center">
      <div class="big">✅</div>
      <h1>Your answers are in.</h1>
      <p class="prompt">That's the raw material. I'm on it — your complete offer package lands in your inbox within 48 hours, reviewed personally.</p>
      <p class="prompt" style="margin-top:14px">Questions in the meantime? Just reply to your purchase email — that's your direct line to me.</p>
      <p style="font-weight:700;margin-top:22px">Let's build your offer.<br>— Michael</p>
    </div>`;
}

function fallback(payload, btn){
  const lines = [`Name: ${payload.full_name}`,`Email: ${payload.email}`,""]
    .concat(QUESTIONS.map(q=>`${q.q}\n${payload[q.key]||"(blank)"}\n`))
    .concat([`Best content links:\n${payload.content_links||"(none)"}`]);
  const body = encodeURIComponent(lines.join("\n"));
  const subject = encodeURIComponent("DFY intake — "+(payload.full_name||payload.email||""));
  card.innerHTML = `
    <h2>Almost there — one tap to send.</h2>
    <p class="prompt">Your answers are saved. Tap below to send them to me by email (opens your mail app), and I'll take it from there.</p>
    <div class="row"><a class="next" style="text-decoration:none;text-align:center" href="mailto:${CONFIG.fallbackEmail}?subject=${subject}&body=${body}">Send my answers &rarr;</a></div>
    <p class="hint" style="margin-top:16px">Nothing was lost — refresh and everything you typed is still here.</p>`;
}

render();
</script>
</body>
</html>
